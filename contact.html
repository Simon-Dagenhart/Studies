<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Seneta</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a href="index.html" class="logo">🌵 <span class="logo-name">Seneta</span></a>
        <nav class="main-nav">
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
            <ul id="navList">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>
<main>
<section class="container narrow">
    <h1 class="section-title">Get in Touch</h1>
    <p>Questions about a course, ready to book a free trial lesson, or need a website for your business? Send a message and I'll get back to you.</p>

    <p class="alert alert-success" id="successAlert" hidden></p>
    <ul class="alert alert-error" id="errorAlert" hidden></ul>

    <form class="contact-form" id="contactForm" novalidate>
        <label for="name">Name</label>
        <input type="text" id="name" name="name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="course">I'm Interested In</label>
        <select id="course" name="course">
            <option value="">Not sure yet</option>
            <optgroup label="Courses">
                <option value="english-foundations">English Foundations</option>
                <option value="conversational-english">Conversational English</option>
                <option value="business-english">Business English</option>
                <option value="computer-basics">Computer Basics for Beginners</option>
                <option value="software-essentials">Software Essentials</option>
                <option value="hardware-basics">Hardware Basics &amp; Troubleshooting</option>
            </optgroup>
            <optgroup label="Other Services">
                <option value="website-development">Website Development for My Business</option>
            </optgroup>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell me a bit about your goals and your preferred schedule..."></textarea>

        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
</section>
</main>
<footer class="site-footer">
    <div class="container footer-inner">
        <p>&copy; <span id="year"></span> Seneta. English &amp; computer skills, taught online.</p>
    </div>
</footer>
<script src="assets/js/main.js"></script>
<script src="assets/js/contact.js"></script>
</body>
</html>
